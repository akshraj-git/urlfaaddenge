<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StayNear Property</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--bg:#0f0f0f;
--card:#1c1c1c;
--accent:#e50914;
--sub:#b3b3b3;
}
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}
body{
background:var(--bg);
color:white;
}
.hero{
height:70vh;
display:flex;
align-items:flex-end;
padding:60px;
background:linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.2)),
url('https://images.unsplash.com/photo-1560448204-e02f11c3d0e2') center/cover no-repeat;
}
.section{
padding:60px;
}
.amenities{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:30px;
}
.amenity{
background:var(--card);
padding:20px;
border-radius:6px;
}
.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
gap:15px;
margin-top:30px;
}
.gallery img{
width:100%;
height:200px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
}
.review{
background:var(--card);
padding:20px;
border-radius:6px;
margin-bottom:20px;
}
input,textarea{
width:100%;
padding:10px;
margin:10px 0;
background:#141414;
border:1px solid #333;
color:white;
border-radius:4px;
}
button{
padding:10px 20px;
background:var(--accent);
border:none;
color:white;
border-radius:4px;
cursor:pointer;
}
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
display:none;
justify-content:center;
align-items:center;
}
.modal img{
max-width:90%;
max-height:90%;
}
iframe{
margin-top:30px;
}
</style>
</head>
<body>

<section class="hero"></section>

<section class="section">
<h1>Sunrise PG</h1>
<p style="color:#b3b3b3;">300m • Boys PG</p>
<h2 style="color:#e50914;margin:20px 0;">₹7000/month</h2>

<h2>About</h2>
<p style="color:#b3b3b3;margin-top:10px;">
Fully furnished rooms with WiFi, meals and laundry service.
</p>

<h2 style="margin-top:40px;">Amenities</h2>
<div class="amenities">
<div class="amenity">WiFi</div>
<div class="amenity">Food</div>
<div class="amenity">Laundry</div>
<div class="amenity">AC</div>
</div>

<h2 style="margin-top:40px;">Gallery</h2>
<div class="gallery">
<img src="https://images.unsplash.com/photo-1502672260266-1c1ef2d93688" onclick="openModal(this.src)">
<img src="https://images.unsplash.com/photo-1493809842364-78817add7ffb" onclick="openModal(this.src)">
</div>

<h2 style="margin-top:40px;">Location</h2>
<iframe width="100%" height="300" style="border:0;"
src="https://www.google.com/maps?q=28.6139,77.2090&output=embed"></iframe>

<h2 style="margin-top:40px;">Reviews</h2>

<div class="review">
<h4>Rahul</h4>
<p>⭐ 4/5</p>
<p style="color:#b3b3b3;">Very clean and good food.</p>
</div>

<h3>Add Review</h3>
<input type="text" placeholder="Your Name">
<textarea placeholder="Your Review"></textarea>
<input type="number" placeholder="Rating 1-5">
<button>Submit</button>

</section>

<div class="modal" id="modal" onclick="closeModal()">
<img id="modalImg">
</div>

<script>
function openModal(src){
document.getElementById("modalImg").src=src;
document.getElementById("modal").style.display="flex";
}
function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
